<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Site - Shopping Cart</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="CSS/style.css">
    <!-- Box Icons -->
    <link href='https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <!-- Header Section -->
     <header>
        <!-- Navigation -->
        <div class="nav container">
            <a href="#" class="logo">Ecommerce</a>
            <!-- Cart Icon -->
            <i class="bx bx-shopping-bag" id="cart-icon"></i>
            <!-- Cart -->
             <div class="cart">
                <h2 class="cart-title">Your Cart</h2>
                <!-- Cart Content -->
                 <div class="cart-content">
                    
                 </div>
                 <!-- Total -->
                    <div class="total">
                        <div class="total-title">Total</div>
                        <div class="total-price">$00.00</div>
                    </div>
                    <!-- Buy Button -->
                    <button type="button" class="btn-buy">Buy Now</button>
                    <!-- Close Cart -->
                    <i class='bx bx-x' id="close-cart"></i>
             </div>
        </div>
     </header>
     <!-- Shop -->
      <section class="shop container">
        <h2 class="section-title">Shop Products</h2>
        <!-- Content -->
        <div class="shop-content">
            <!-- Product 1 -->
            <div class="product-box">
                <img src="images/product1.jpg" alt="Product 1" class="product-img">
                <h2 class="product-title">AEROREADY SHIRT</h2>
                <span class="price">$25.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 2 -->
            <div class="product-box">
                <img src="images/product2.jpg" alt="Product 2" class="product-img">
                <h2 class="product-title">WIRELESS EARBUDS</h2>
                <span class="price">$100.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 3 -->
            <div class="product-box">
                <img src="images/product3.jpg" alt="Product 3" class="product-img">
                <h2 class="product-title">HOODED PARKA</h2>
                <span class="price">$45.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 4 -->
            <div class="product-box">
                <img src="images/product4.jpg" alt="Product 4" class="product-img">
                <h2 class="product-title">STRAW METAL BOTTLE</h2>
                <span class="price">$24.04</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 5 -->
            <div class="product-box">
                <img src="images/product5.jpg" alt="Product 5" class="product-img">
                <h2 class="product-title">METAL SUNGLASSES</h2>
                <span class="price">$50.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 6 -->
            <div class="product-box">
                <img src="images/product6.jpg" alt="Product 6" class="product-img">
                <h2 class="product-title">BACK HAT</h2>
                <span class="price">$22.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 7 -->
            <div class="product-box">
                <img src="images/product7.jpg" alt="Product 7" class="product-img">
                <h2 class="product-title">BACKPACK</h2>
                <span class="price">$70.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
            <!-- Product 8 -->
            <div class="product-box">
                <img src="images/product8.jpg" alt="Product 8" class="product-img">
                <h2 class="product-title">ULTRABOOST 22</h2>
                <span class="price">$45.00</span>
                <i class='bx bx-shopping-bag add-cart'></i>
            </div>
        </div>
      </section>
      <!-- Link to JS -->
      <script src="JS/main.js"></script>
</body>
</html>
